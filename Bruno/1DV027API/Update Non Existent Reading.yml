info:
  name: Update Non Existent Reading
  type: graphql
  seq: 19

graphql:
  method: POST
  url: https://climate-reading-api.vercel.app/graphql
  headers:
    - name: Authorization
      value: Bearer {{token}}
      enabled: true
  body:
    query: |-
      mutation UpdateReading($id: ID!, $input: ReadingInput!) {
        updateReading(id: $id, input: $input) {
          id
        }
      }
    variables: |-
      {
        "id": "000000000000000000000000",
        "input": {
          "cityId": "{{cityId}}",
          "date": "2024-01-01",
          "averageTemperature": 5.0
        }
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test('Update non-existent reading returns error', function () {
            expect(res.getBody().errors).to.not.be.undefined;
        });

        test('Update non-existent reading error code is NOT_FOUND', function () {
            expect(res.getBody().errors[0].extensions.code).to.equal('NOT_FOUND');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
